kind = "web"
previewPath = "/"
title = "L'Atelier Groupe"
version = "1.0.0"
id = "artifacts/latelier-groupe"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21619
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/latelier-groupe run dev"

[services.env]
PORT = "21619"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/latelier-groupe", "run", "build"]
publicDir = "artifacts/latelier-groupe/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
